<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table Layout</title>
</head>
<body>
    <table border="1" cellspacing="0" cellpadding="20" align="center">
        <caption><b>Complex Table Layout</b></caption>
        <!-- Row 1 -->
        <tr>
            <td rowspan="2" colspan="2" align="center">
                <img src="https://www.bing.com/images/search?view=detailV2&ccid=HxV79tFM&id=EECFBB7F4320921571A539DB459CACFE9D1EC242&thid=OIP.HxV79tFMPfBAIo0BBF-sOgHaEy&mediaurl=https%3A%2F%2Fimages.pexels.com%2Fphotos%2F443446%2Fpexels-photo-443446.jpeg%3Fcs%3Dsrgb%26dl%3Ddaylight-forest-glossy-443446.jpg%26fm%3Djpg&exph=3403&expw=5266&q=images&simid=608047184014999685&form=IRPRST&ck=1E7B8714B344587AFF408DB915B86DCE&selectedindex=1&itb=0&ajaxhist=0&ajaxserp=0&vt=0&sim=11" alt="Example Image" style="width:100px;height:100px;">
            </td>
            <td align="center" bgcolor="#f5a623">r1c3</td>
            <td rowspan="2" align="center" style="font-family:Arial; color:green; font-weight:bold;">Stay Positive!</td>
            <td rowspan="2" colspan="2" align="center">r1c5</td>
        </tr>
        <!-- Row 2 -->
        <tr>
            <td rowspan="2" align="center">
                <a href="yashdharad5@gmail.com">Email Me</a>
            </td>
        </tr>
        <!-- Row 3 -->
        <tr>
            <td colspan="2" align="center">
                <a href="home.html">Go to Home</a>
            </td>
            <td colspan="2" align="center">
                <a href="https://www.example.com">
                    <img src="example-link.jpg" alt="Link Image" style="width:100px;height:100px;">
                </a>
            </td>
            <td align="center">r3c6</td>
        </tr>
        <!-- Row 4 -->
        <tr>
            <td align="center">r4c1</td>
            <td colspan="2" align="center" bgcolor="#f5a623">r4c2</td>
            <td rowspan="2" align="center">r4c4</td>
            <td colspan="2" align="center">r4c5</td>
        </tr>
        <!-- Row 5 -->
        <tr>
            <td rowspan="2" colspan="2" align="center" bgcolor="#f5a623">r5c1</td>
            <td rowspan="2" align="center" style="font-family:Arial; color:green; font-weight:bold;">You Can Do It!</td>
            <td colspan="2" rowspan="2" align="center" style="font-family:Arial; color:green; font-weight:bold;">Keep Going!</td>
        </tr>
        <!-- Row 6 -->
        <tr>
            <td align="center" style="font-family:Arial; color:green; font-weight:bold;">Believe in Yourself!</td>
        </tr>
    </table>
</body>
</html>
